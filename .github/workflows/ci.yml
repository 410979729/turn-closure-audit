name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build/test dependencies
        run: python -m pip install --upgrade pip build pytest
      - name: Release gate
        run: python scripts/check.release.py
